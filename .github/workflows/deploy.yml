name: Deploy VitePress to GitHub Pages

on:
  push:
    branches: [main]
  # Source repos dispatch this event from their release workflows after a
  # successful publish so the docs site rebuilds with the new version.
  # Payload conventions: { repo: '<repo-name>', ref: '<git-tag-or-branch>' }
  repository_dispatch:
    types: [docs-update]
  workflow_dispatch:
  # Backstop: nightly rebuild picks up content drift on `main` for unreleased
  # changes. Off by default — uncomment if drift becomes an issue.
  # schedule:
  #   - cron: '0 4 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build docs site
        # Runs the whole `docs:build` — verify-suite-config, docs:pull,
        # docs:hardware, docs:catalog, docs:media, docs:connecting,
        # docs:matrix, docs:harness, then `vitepress build`. Run the full
        # pipeline, never a hand-picked subset: a partial prep leaves
        # generated pages (docs/hardware/index.md, docs/connecting.md,
        # docs/<driver>/media.md, …) missing and the build dead-links on
        # them. This keeps CI identical to a local `npm run docs:build`.
        env:
          # A repository_dispatch payload may pin one source repo to a
          # specific ref; pass it through so pull-driver-docs picks it up.
          DISPATCH_REPO: ${{ github.event.client_payload.repo }}
          DISPATCH_REF: ${{ github.event.client_payload.ref }}
          # Lifts the GitHub API rate limit for the harness-bundle pull
          # (docs:harness); the harness repo is public so it also works
          # unauthenticated.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$DISPATCH_REPO" ] && [ -n "$DISPATCH_REF" ]; then
            UPPER=$(echo "$DISPATCH_REPO" | tr '[:lower:]-' '[:upper:]_')
            export "TL_DOCS_${UPPER}=${DISPATCH_REF}"
            echo "Pinning $DISPATCH_REPO to $DISPATCH_REF"
          fi
          npm run docs:build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
