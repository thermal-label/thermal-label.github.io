name: Deploy VitePress to GitHub Pages

on:
  push:
    branches: [main]
  # Source repos dispatch this event from their release workflows after a
  # successful publish so the docs site rebuilds with the new version.
  # Payload conventions: { repo: '<repo-name>', ref: '<git-tag-or-branch>' }
  repository_dispatch:
    types: [docs-update]
  workflow_dispatch:
  # Backstop: nightly rebuild picks up content drift on `main` for unreleased
  # changes. Off by default — uncomment if drift becomes an issue.
  # schedule:
  #   - cron: '0 4 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Pull per-repo docs
        env:
          # repository_dispatch payload may pin a single source repo to a
          # specific ref; pass it through as the appropriate env var so the
          # puller picks it up.
          DISPATCH_REPO: ${{ github.event.client_payload.repo }}
          DISPATCH_REF: ${{ github.event.client_payload.ref }}
        run: |
          if [ -n "$DISPATCH_REPO" ] && [ -n "$DISPATCH_REF" ]; then
            UPPER=$(echo "$DISPATCH_REPO" | tr '[:lower:]-' '[:upper:]_')
            export "TL_DOCS_${UPPER}=${DISPATCH_REF}"
            echo "Pinning $DISPATCH_REPO to $DISPATCH_REF"
          fi
          npm run docs:pull
      - run: npm run docs:hardware
      - run: npx vitepress build docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
