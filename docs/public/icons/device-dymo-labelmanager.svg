<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <title>DYMO LabelManager handheld D1 tape printer</title>
  <!-- Handheld body, rounded -->
  <path d="M16 4 L48 4 Q52 4 52 8 L52 56 Q52 60 48 60 L16 60 Q12 60 12 56 L12 8 Q12 4 16 4 Z"/>
  <!-- LCD display at top -->
  <rect x="18" y="10" width="28" height="9" rx="1"/>
  <!-- Tape exit notch on the left edge -->
  <path d="M12 24 L8 24 L8 30 L12 30"/>
  <!-- Keyboard grid: 4 rows × 5 keys -->
  <circle cx="20" cy="28" r="1.4"/>
  <circle cx="26" cy="28" r="1.4"/>
  <circle cx="32" cy="28" r="1.4"/>
  <circle cx="38" cy="28" r="1.4"/>
  <circle cx="44" cy="28" r="1.4"/>
  <circle cx="20" cy="36" r="1.4"/>
  <circle cx="26" cy="36" r="1.4"/>
  <circle cx="32" cy="36" r="1.4"/>
  <circle cx="38" cy="36" r="1.4"/>
  <circle cx="44" cy="36" r="1.4"/>
  <circle cx="20" cy="44" r="1.4"/>
  <circle cx="26" cy="44" r="1.4"/>
  <circle cx="32" cy="44" r="1.4"/>
  <circle cx="38" cy="44" r="1.4"/>
  <circle cx="44" cy="44" r="1.4"/>
  <!-- Bigger return key on the bottom row -->
  <rect x="18" y="50" width="14" height="6" rx="1.5"/>
  <circle cx="38" cy="53" r="1.4"/>
  <circle cx="44" cy="53" r="1.4"/>
</svg>
