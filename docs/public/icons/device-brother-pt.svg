<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <title>Brother PT desktop tape printer</title>
  <!-- Main body -->
  <rect x="6" y="22" width="44" height="32" rx="3"/>
  <!-- Top cassette compartment opening -->
  <rect x="12" y="14" width="32" height="8" rx="1"/>
  <!-- Two reels visible through the lid window -->
  <circle cx="20" cy="18" r="2"/>
  <circle cx="36" cy="18" r="2"/>
  <!-- Side tape exit on the right -->
  <path d="M50 32 L60 32 L60 38 L50 38"/>
  <!-- Tape strip emerging from the side exit -->
  <line x1="58" y1="35" x2="62" y2="35"/>
  <!-- Front control buttons -->
  <circle cx="16" cy="44" r="1.5"/>
  <circle cx="24" cy="44" r="1.5"/>
  <circle cx="32" cy="44" r="1.5"/>
  <circle cx="40" cy="44" r="1.5"/>
</svg>
